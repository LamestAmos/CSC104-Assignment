<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Shopping Cart</title>
  </head>
  <body>
    <main>
      <section id="shop">
        <ul>
          <li class="product">
            <img src="https://placehold.co/125x50" alt="Product 1" />
            <h2>Product 1</h2>
            <button type="button">Add To Cart</button>
          </li>
          <li class="product">
            <img src="https://placehold.co/125x50" alt="Product 2" />
            <h2>Product 2</h2>
            <button type="button">Add To Cart</button>
          </li>
          <li class="product">
            <img src="https://placehold.co/125x50" alt="Product 3" />
            <h2>Product 3</h2>
            <button type="button">Add To Cart</button>
          </li>
          <li class="product">
            <img src="https://placehold.co/125x50" alt="Product 4" />
            <h2>Product 4</h2>
            <button type="button">Add To Cart</button>
          </li>
          <li class="product">
            <img src="https://placehold.co/125x50" alt="Product 5" />
            <h2>Product 5</h2>
            <button type="button">Add To Cart</button>
          </li>
        </ul>
      </section>

      <section id="cart"></section>
    </main>
    <script src="index.js" defer></script>
  </body>
</html>
